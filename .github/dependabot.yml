---
version: 2
updates:
  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # --- npm ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    groups:
      # First-party @f5-sales-demo/* packages: track latest daily, all update types
      # (auto-merged once CI is green) so internal deps never drift behind.
      f5-internal:
        patterns:
          - "@f5-sales-demo/*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # typescript-eslint peer-caps TypeScript at <6.1.0, and no typescript-eslint
      # release yet supports TS 6 or the TS 7 native-compiler preview. Major
      # TypeScript bumps therefore break `npm ci` with ERESOLVE. Ignore TS majors
      # until the lint toolchain supports them; minor/patch within the 5.x line
      # still flow via npm-minor-patch.
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
